<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREPNOVA - Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#cae2ea,#e5e8ec);
    padding:40px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:50px;
    color:#1a0101;
}

.page-no{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.card-container{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CLICKABLE CARD */
.card{
    background:rgb(239,233,196);
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
    cursor:pointer;
    text-decoration:none;
    color:black;
}

.card:hover{
    transform:translateY(-10px);
}

/* ICON */
.icon{
    font-size:40px;
    margin-bottom:10px;
}

/* TITLE */
.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#444;
    font-style:italic;
}

.btns{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#d4d006f3;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#c5c105;
}
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:320px;
    animation:pop 0.4s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.check{
    width:80px;
    height:80px;
    background:#4CAF50;
    color:white;
    font-size:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:15px;
}

.popup-box h2{
    color:#222;
    margin-bottom:10px;
}

.popup-box p{
    color:gray;
}

@keyframes pop{
    from{transform:scale(0.5);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
</style>

</head>

<body>

<div class="header">
    <h1>📞 Contact PREPNOVA</h1>
</div>

<div class="page-no">Page 4 / 4</div>

<div class="card-container">

    <!-- EMAIL -->
    <a class="card" href="mailto:prepnova.wb@gmail.com">
        <div class="icon">📧</div>
        <div class="title">Email Us</div>
    </a>

    <!-- WHATSAPP -->
    <a class="card" href="https://wa.me/919330707046" target="_blank">
        <div class="icon">📱</div>
        <div class="title">WhatsApp</div>
    </a>

    <!-- TELEGRAM -->
    <a class="card" href="https://t.me/+HHiN6bFosWUwZmQ1" target="_blank">
        <div class="icon">✈️</div>
        <div class="title">Telegram</div>
    </a>

    <!-- INSTAGRAM -->
    <a class="card" href="https://instagram.com/yourid" target="_blank">
        <div class="icon">📸</div>
        <div class="title">Instagram</div>
    </a>

    <!-- YOUTUBE -->
    <a class="card" href="https://www.youtube.com/@PrepNova-wb" target="_blank">
        <div class="icon">▶️</div>
        <div class="title">YouTube Channel</div>
    </a>

</div>

<div class="btns">

    <button onclick="window.location.href='dashboard.html'">
        ⬅ Back
    </button>

    <button onclick="finishNow()">
    Finish ✔
</button>

</div>

<div class="footer">
    “Stay connected. Stay ahead. PREPNOVA supports your success.”
</div>
<div id="successPopup" class="popup">
    <div class="popup-box">
        <div class="check">✔</div>
        <h2>Thanks for Connecting with PREPNOVA 🚀</h2>
        <p>Redirecting you to homepage...</p>
    </div>
</div>

<script>
function finishNow(){
    document.getElementById("successPopup").style.display = "flex";

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2500);
}
</script>

</body>
</html>
