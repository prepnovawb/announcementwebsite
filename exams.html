<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREPNOVA - Exams</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#cae2ea,#e5e8ec);
    padding:40px;
}

/* Header */
.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:50px;
    color:#1a0101;
}

.header p{
    font-size:18px;
    color:#444;
}

/* Page counter */
.page-no{
    text-align:center;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

/* Grid cards */
.card-container{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgb(239,233,196);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
}

.left{
    font-size:20px;
    font-weight:bold;
    color:#222;
}

.right{
    font-size:14px;
    color:#555;
    text-align:right;
    max-width:150px;
}

/* Buttons */
.btns{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#d4d006f3;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#c5c105;
}
.card{
    background:rgb(239,233,196);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
    cursor:pointer;
    text-align:center;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:140px;
}

.card:hover{
    transform:translateY(-8px);
}

.exam-name{
    font-size:28px;
    font-weight:900;
    color:#111;
    letter-spacing:1px;
    margin-bottom:10px;
}

.exam-update{
    font-size:15px;
    color:#555;
    font-weight:600;
}
</style>

</head>
<body>

<div class="header">
    <h1>📚 Competitive Exams</h1>
      <center><p>View updates and guidance of your selected exams</p></center>
</div>

<div class="page-no">
    Page 2 / 4
</div>

<div class="card-container">

    <div class="card" onclick="window.location.href='wbjee.html'">
    <div class="exam-name">WBJEE</div>
</div>

<div class="card" onclick="window.location.href='jeemains.html'">
    <div class="exam-name">JEE MAINS</div>
</div>

<div class="card" onclick="window.location.href='neet.html'">
    <div class="exam-name">NEET</div>
</div>

<div class="card" onclick="window.location.href='jeeadvanced.html'">
    <div class="exam-name">JEE ADVANCED</div>
    <div class="exam-update">Updates Coming Soon</div>
</div>

<div class="card" onclick="window.location.href='cuet.html'">
    <div class="exam-name">CUET</div>
    <div class="exam-update">Updates Coming Soon</div>
</div>

<div class="card" onclick="window.location.href='iiser.html'">
    <div class="exam-name">IISER</div>
    <div class="exam-update">Updates Coming Soon</div>
</div>

<div class="card" onclick="window.location.href='niser.html'">
    <div class="exam-name">NISER</div>
    <div class="exam-update">Updates Coming Soon</div>
</div>

<div class="card" onclick="window.location.href='jenpas.html'">
    <div class="exam-name">JENPAS (UG)</div>
    <div class="exam-update">Updates Coming Soon</div>
</div>

</div>

<div class="btns">

    <!-- BACK BUTTON -->
    <button onclick="window.location.href='index.html'">
        ⬅ Back
    </button>

    <!-- NEXT BUTTON -->
    <button onclick="window.location.href='dashboard.html'">
        Next ➡
    </button>

</div>

</body>
</html>
