<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBJEE - PREPNOVA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#cae2ea,#e5e8ec);
padding:40px;
min-height:100vh;
}

h1{
text-align:center;
font-size:50px;
margin-bottom:40px;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgb(239,233,196);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card h2{
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 22px;
background:#d4d006f3;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:12px;
}

.status{
font-size:18px;
color:#555;
font-weight:bold;
}

.back-btn{
display:block;
width:220px;
margin:50px auto;
padding:15px;
border:none;
border-radius:15px;
background:#d4d006f3;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>
<body>

<h1>📘 WBJEE </h1>

<div class="card-container">

<div class="card">

<h2>📝 Mock Tests</h2>

<button class="btn"
onclick="window.location.href='wbjeemocktests.html'">
Open
</button>

</div>


<div class="card">

<h2>📄 Answer Key</h2>

<button class="btn"
onclick="window.location.href='wbjeeanswerkeys.html'">
Open
</button>

</div>


<div class="card">

<h2>✅ Solutions</h2>

<button class="btn"
onclick="window.location.href='wbjeesolutions.html'">
Open
</button>

</div>

</div>

<button class="back-btn"
onclick="window.location.href='exams.html'">
⬅ Back
</button>

</body>
</html>
